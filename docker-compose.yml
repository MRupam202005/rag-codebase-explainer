version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  mongo:
    image: mongo:6
    container_name: rag-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  node-server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: rag-node-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - MONGODB_URI=mongodb://mongo:27017/rag-codebase-explainer
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET:-supersecretaccess}
      - ACCESS_TOKEN_EXPIRY=1d
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET:-supersecretrefresh}
      - REFRESH_TOKEN_EXPIRY=10d
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - PORT=5000
      - PYTHON_WORKER_URL=http://python-api:8000
    depends_on:
      - mongo
      - redis
    restart: always

  python-api:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: rag-python-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    command: ["uvicorn", "app.api:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - redis
      - qdrant
    restart: always

  python-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: rag-python-worker
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    command: ["python", "app/main.py"]
    depends_on:
      - redis
      - qdrant
    restart: always

volumes:
  redis_data:
  qdrant_data:
  mongo_data:
